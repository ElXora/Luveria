name: Build Luveria APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK (no bundled JRE)
        run: |
          ./gradlew :app_pojavlauncher:assembleDebug --no-daemon
          mkdir -p out
          cp app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/Luveria-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Luveria-debug-apk
          path: out/Luveria-debug.apk
          retention-days: 30
