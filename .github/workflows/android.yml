name: Build Luveria APK

on:
  push:
    branches: [ main, develop, "release/**" ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  GRADLE_VERSION: 8.4
  JDK_8_VERSION: 8
  JDK_17_VERSION: 17
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JDK_8_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        run: ./gradlew wrapper --validate-only

      - name: Update language list
        run: |
          if [ -f ./scripts/languagelist_updater.sh ]; then
            chmod +x ./scripts/languagelist_updater.sh
            ./scripts/languagelist_updater.sh
          fi

      - name: Clean build directory
        run: ./gradlew clean --no-daemon --warning-mode all

      - name: Build JRE JAR files
        run: ./gradlew :jre_lwjgl3glfw:build \
          --no-daemon \
          --warning-mode all \
          --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JDK_17_VERSION }}
          cache: gradle

      - name: Build Debug APK
        run: ./gradlew :app_pojavlauncher:assembleDebug \
          --no-daemon \
          --warning-mode all \
          --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -x lint

      - name: Verify APK build
        run: |
          if [ ! -f "app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk" ]; then
            echo "❌ APK not found at expected location"
            find . -name "*debug*.apk" -type f
            exit 1
          fi
          echo "✓ APK build successful"

      - name: Prepare artifacts directory
        run: |
          mkdir -p build_artifacts
          cp app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk build_artifacts/luveria-debug.apk
          ls -lh build_artifacts/

      - name: Generate build info
        run: |
          cat > build_artifacts/BUILD_INFO.txt << EOF
          Build Information
          ==================
          Build Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          Git Commit: $(git rev-parse HEAD)
          Git Branch: $(git rev-parse --abbrev-ref HEAD)
          Gradle Version: ${{ env.GRADLE_VERSION }}
          JDK Version: ${{ env.JDK_17_VERSION }}
          EOF
          cat build_artifacts/BUILD_INFO.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: luveria-debug-apk
          path: build_artifacts/luveria-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-info
          path: build_artifacts/BUILD_INFO.txt
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ APK built successfully! Download from the Actions artifacts.'
            })

      - name: Report build failure
        if: failure()
        run: |
          echo "❌ Build failed. Check the logs above for details."
          exit 1

  notify:
    name: Notify build status
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Build status summary
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Luveria APK build completed successfully"
          else
            echo "❌ Luveria APK build failed"
            exit 1
          fi
          
