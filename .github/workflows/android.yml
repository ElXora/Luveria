name: Build Luveria APK
on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
          
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        
      - name: Clear Gradle cache
        run: ./gradlew clean --no-daemon
        
      - name: Update language list
        run: chmod +x ./scripts/languagelist_updater.sh && ./scripts/languagelist_updater.sh
        
      - name: Build JRE JAR files
        run: ./gradlew :jre_lwjgl3glfw:build --no-daemon --warning-mode none --stacktrace
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build Debug APK
        run: ./gradlew :app_pojavlauncher:assembleDebug --no-daemon --warning-mode none --stacktrace -x lint
        
      - name: Find and rename APK
        run: |
          mkdir -p out
          find . -name "*debug*.apk" -not -path "*/build/intermediates/*" | head -1 | xargs -I{} cp {} out/luveria-debug.apk
          echo "APK copied:"
          ls -lh out/
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luveria-debug
          path: out/luveria-debug.apk
          
