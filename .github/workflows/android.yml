name: Build Luveria APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Update language list
        run: chmod +x ./scripts/languagelist_updater.sh && ./scripts/languagelist_updater.sh

      - name: Build JRE JAR files
        run: |
          mkdir -p out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          gradle :app_pojavlauncher:assembleDebug --no-daemon
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/luveria-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luveria-debug
          path: out/luveria-debug.apk
